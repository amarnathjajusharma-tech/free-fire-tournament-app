<!DOCTYPE html>
<html>
<head>
<title>History</title>

<style>
body{
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>📜 Transaction History</h2>

<div id="list"></div>

<script>

let data = JSON.parse(localStorage.getItem("transactions")) || [];

let div = document.getElementById("list");

data.forEach(t => {

  div.innerHTML += `
    <div class="card">
      ₹${t.amount} <br>
      Status: ${t.status} <br>
      ${t.time}
    </div>
  `;
});

</script>

</body>
</html>
