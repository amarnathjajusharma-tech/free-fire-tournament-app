<!DOCTYPE html>
<html>
<head>
<title>Deposit</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box{
  background:#222;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

button{
  padding:12px;
  margin:10px;
  background:#ff5722;
  border:none;
  color:white;
  border-radius:5px;
}

img{
  width:250px;
  margin:20px;
  display:none;
}
</style>

</head>

<body>

<h2>💰 Add Money</h2>

<div class="box">

  <h3>Select Amount</h3>

  <!-- AMOUNT OPTIONS -->
  <button onclick="selectAmt(10)">₹10</button>
  <button onclick="selectAmt(50)">₹50</button>
  <button onclick="selectAmt(100)">₹100</button>
  <button onclick="selectAmt(500)">₹500</button>
  <button onclick="selectAmt(1000)">₹1000</button>

  <p id="selected"></p>

  <!-- QR -->
  <img id="qr" src="qr.png">

  <br>

  <button id="payBtn" onclick="paid()" style="display:none;">
    I HAVE PAID
  </button>

  <p id="msg"></p>

</div>

<script>

let amount = 0;

// SELECT AMOUNT
function selectAmt(a){
  amount = a;

  document.getElementById("selected").innerHTML =
  "Selected: ₹" + a;

  // QR show
  document.getElementById("qr").style.display = "block";
  document.getElementById("payBtn").style.display = "inline-block";
}

// USER CLICK AFTER PAYMENT
function paid(){

  if(amount < 10){
    alert("Select amount ❌");
    return;
  }

  localStorage.setItem("pendingDeposit", amount);

  document.getElementById("msg").innerHTML =
  "⏳ Payment sent! Waiting for admin approval...";
}

</script>

</body>
</html>
<script>

// AUTO TIMER FAKE VERIFY STATUS
function paid(){

  if(amount < 10){
    alert("Select amount ❌");
    return;
  }

  let txn = {
    amount: amount,
    status: "pending",
    time: new Date().toLocaleString()
  };

  let list = JSON.parse(localStorage.getItem("transactions")) || [];

  list.push(txn);

  localStorage.setItem("transactions", JSON.stringify(list));
  localStorage.setItem("pendingDeposit", amount);

  document.getElementById("msg").innerHTML =
  "⏳ Payment sent! Waiting for admin verification...";
}

</script>
