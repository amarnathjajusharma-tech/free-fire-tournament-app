<!DOCTYPE html>
<html>
<head>
<title>Deposit</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box{
  background:#222;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

img{
  width:250px;
  margin:20px;
}

input{
  padding:10px;
  width:80%;
  margin:10px;
}

button{
  padding:12px;
  background:#4caf50;
  border:none;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<h2>💰 Deposit Money</h2>

<div class="box">

  <h3>Scan & Pay</h3>

  <!-- 🔥 TERA QR CODE -->
  <img src="qr.png">

  <p>Min ₹10 – Max ₹1000</p>

  <input id="amt" placeholder="Enter Amount">

  <br>

  <button onclick="deposit()">I HAVE PAID</button>

  <p id="msg"></p>

</div>

<script>

function deposit(){

  let amt = Number(document.getElementById("amt").value);

  if(amt < 10 || amt > 1000){
    alert("Min ₹10 - Max ₹1000 ❌");
    return;
  }

  localStorage.setItem("pendingDeposit", amt);

  document.getElementById("msg").innerHTML =
  "⏳ Please wait for confirmation...";

}

</script>

</body>
</html>
