<!DOCTYPE html>
<html>
<head>
<title>PRGAMER MATCHES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

.header{
  padding:15px;
  font-size:22px;
  text-align:center;
  background:#111;
}

.card{
  background:#2a004f;
  margin:15px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 0 10px #000;
}

.banner{
  width:100%;
  height:160px;
  background:url('https://i.ibb.co/5k7VZgQ/freefire.jpg');
  background-size:cover;
}

.content{
  padding:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.join{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#7c4dff;
  border:none;
  border-radius:6px;
  color:white;
  font-size:15px;
}
</style>
</head>

<body>

<div class="header">🔥 FULL MAP TOURNAMENTS</div>

<div id="matches"></div>

<script>

// Wallet
let wallet = Number(localStorage.getItem("wallet")) || 10;

// Match Generator
let matches = [];
let types = ["Solo","Duo","Squad"];
let limits = {Solo:1, Duo:2, Squad:4};

let hour = 7;
let minute = 0;
let index = 0;

while(hour < 10 || (hour === 10 && minute === 0)){

  let type = types[index % 3];

  let time = hour + ":" + (minute==0?"00":minute) + " PM";

  matches.push({
    type:type,
    time:time,
    joined:Math.floor(Math.random()*30)+5,
    total:48,
    entry:1,
    kill:0.5,
    limit:limits[type]
  });

  minute += 20;
  index++;

  if(minute>=60){
    minute=0;
    hour++;
  }
}

// Render Matches
let div = document.getElementById("matches");

matches.forEach((m,i)=>{

  let el = document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <div class="banner"></div>

    <div class="content">
      <h3>${m.type} Tournament</h3>

      <div class="row">
        <span>${m.time}</span>
        <span>Entry ₹${m.entry}</span>
      </div>

      <div class="row">
        <span>Per Kill ₹${m.kill}</span>
        <span>${m.joined}/${m.total}</span>
      </div>

      <div class="row">
        <span>Players Allowed: ${m.limit}</span>
        <span>Booyah: ₹${m.type=="Solo"?10:m.type=="Duo"?20:40}</span>
      </div>

      <button class="join" onclick="joinMatch(${i})">JOIN</button>
    </div>
  `;

  div.appendChild(el);
});

// Join Function
function joinMatch(i){

  if(wallet < 1){
    alert("❌ Not enough balance");
    return;
  }

  wallet -= 1;
  localStorage.setItem("wallet",wallet);

  let players = JSON.parse(localStorage.getItem("players")) || [];

  players.push({
    match:matches[i].type,
    time:matches[i].time
  });

  localStorage.setItem("players",JSON.stringify(players));

  alert("✅ Joined Successfully!");
}

</script>

</body>
</html>
