<!DOCTYPE html>
<html>
<head>
<title>PRGAMER MATCHES</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  background:#111;
}

.card{
  background:#2a004f;
  margin:15px;
  border-radius:12px;
  overflow:hidden;
}

.banner{
  width:100%;
  height:140px;
  background:linear-gradient(45deg,#ff0000,#ff9800);
}

.content{
  padding:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.join{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#7c4dff;
  border:none;
  color:white;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="header">🔥 FULL MAP TOURNAMENTS</div>

<div id="matches"></div>

<script>

// default wallet
if(!localStorage.getItem("wallet")){
  localStorage.setItem("wallet",10);
}

// matches generate
let matches = [];
let types = ["Solo","Duo","Squad"];
let limits = {Solo:1, Duo:2, Squad:4};

let hour = 7;
let minute = 0;
let index = 0;

while(hour < 10 || (hour === 10 && minute === 0)){

  let type = types[index % 3];

  let time = hour + ":" + (minute==0?"00":minute) + " PM";

  matches.push({
    type:type,
    time:time,
    joined:Math.floor(Math.random()*48),
    total:48,
    entry:1,
    kill:0.5,
    limit:limits[type]
  });

  minute += 20;
  index++;

  if(minute>=60){
    minute=0;
    hour++;
  }
}

// render matches
let div = document.getElementById("matches");

matches.forEach((m,i)=>{

  let el = document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <div class="banner"></div>

    <div class="content">

      <h3>${m.type} Tournament</h3>

      <div class="row">
        <span>${m.time}</span>
        <span>Entry ₹${m.entry}</span>
      </div>

      <div class="row">
        <span>Per Kill ₹${m.kill}</span>
        <span>${m.joined}/${m.total}</span>
      </div>

      <div class="row">
        <span>Players: ${m.limit}</span>
        <span>Booyah: ₹${m.type=="Solo"?10:m.type=="Duo"?20:40}</span>
      </div>

      <button class="join" onclick="joinMatch(${i})">JOIN</button>

    </div>
  `;

  div.appendChild(el);
});

// JOIN FUNCTION
function joinMatch(i){

  let m = matches[i];

  if(m.joined >= m.total){
    alert("❌ Match Full");
    return;
  }

  let wallet = Number(localStorage.getItem("wallet")) || 0;

  if(wallet < 1){
    alert("❌ Not enough balance");
    return;
  }

  // deduct wallet
  wallet -= 1;
  localStorage.setItem("wallet",wallet);

  // save match type for next page
  localStorage.setItem("matchType",m.type);

  // go next
  window.location.href="join.html";
}

</script>

</body>
</html>
