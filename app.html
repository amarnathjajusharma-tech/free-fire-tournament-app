<!DOCTYPE html>
<html>
<head>
  <title>PRGAMER APP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #000000, #1a1a1a);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
    }

    h1 {
      color: orange;
      font-size: 32px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🔥 Welcome to PRGAMER APP 🔥</h1>
  <h3>Choose Language</h3>

  <button onclick="go('en')">English</button>
  <button onclick="go('hi')">Hindi</button>
</div>

<script>
function go(lang){
  localStorage.setItem("lang", lang);
  window.location.href = "app.html";
}
</script>

</body>
</html>
