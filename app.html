<!DOCTYPE html>
<html>
<head>
  <title>PRGAMER APP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #000000, #1a1a1a);
      color: white;
    }

    .navbar {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      color: orange;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .card {
      background: #222;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<div class="navbar">
🔥 PRGAMER TOURNAMENT 🔥
</div>

<div class="container">

<div class="card">
  <h2 id="title">Free Fire Tournament</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="text" id="uid" placeholder="Enter UID">

  <button onclick="addPlayer()">Join Tournament</button>
</div>

<div class="card">
  <h3>Players List</h3>
  <ul id="list"></ul>
</div>

<div class="card">
  <button onclick="googleLogin()">Login with Google</button>
</div>

</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔥 Language system
let lang = localStorage.getItem("lang");

if (lang === "hi") {
  document.getElementById("title").innerText = "फ्री फायर टूर्नामेंट";
}

// 🔥 Firebase Config (same rakho)
const firebaseConfig = {
  apiKey: "AIzaSyC0PKnt1rkQdGfGe63-HV_ZXT23SHVWA0M",
  authDomain: "free-fire-tournament-57f55.firebaseapp.com",
  projectId: "free-fire-tournament-57f55",
  storageBucket: "free-fire-tournament-57f55.appspot.com",
  messagingSenderId: "113487807699",
  appId: "1:113487807699:web:8f556464f2301320ed0026"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// 🔥 Add Player
function addPlayer() {
  let name = document.getElementById("name").value;
  let uid = document.getElementById("uid").value;

  if (!name || !uid) {
    alert("Fill all details!");
    return;
  }

  db.collection("players").doc(uid).set({
    name: name,
    uid: uid
  });

  alert("Joined Tournament 🔥");
}

// 🔥 Show Players
db.collection("players").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();
    let li = document.createElement("li");
    li.textContent = data.name + " - " + data.uid;
    list.appendChild(li);
  });
});

// 🔥 Google Login
function googleLogin() {
  let provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(result => {
      alert("Welcome " + result.user.email);
    })
    .catch(error => {
      alert(error.message);
    });
}

</script>

</body>
</html>
