<!DOCTYPE html>
<html>
<head>
<title>JOIN MATCH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

.header{
  background:black;
  color:white;
  padding:15px;
  font-size:18px;
  text-align:center;
}

.title{
  background:#4b0082;
  color:white;
  text-align:center;
  padding:10px;
}

.team{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid #ccc;
  background:white;
}

.joinBtn{
  width:100%;
  padding:15px;
  background:#4b0082;
  color:white;
  border:none;
  position:fixed;
  bottom:0;
  font-size:18px;
}
</style>

</head>

<body>

<div class="header">🎮 JOIN MATCH</div>

<!-- UID -->
<div id="step1">

  <h3 style="text-align:center;">Enter UID</h3>

  <input id="uid" placeholder="Enter Game UID" style="width:80%;padding:10px;margin:20px auto;display:block;">

  <div style="text-align:center;">
    <button onclick="next()">Continue</button>
  </div>

</div>

<!-- TEAM -->
<div id="step2" style="display:none;">

  <div class="title">Select Match Position</div>

  <div id="teams"></div>

  <button class="joinBtn" onclick="finalJoin()">JOIN NOW</button>

</div>

<script>

// get match index
let matchIndex = localStorage.getItem("matchIndex");

// match type
let matchType = localStorage.getItem("matchType") || "Solo";

// UID NEXT
function next(){

  let uid = document.getElementById("uid").value;

  if(!uid){
    alert("Enter UID ❌");
    return;
  }

  localStorage.setItem("uid",uid);

  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";
}

// CREATE TEAM LIST
let teamDiv = document.getElementById("teams");

for(let i=1;i<=21;i++){

  let div = document.createElement("div");
  div.className="team";

  div.innerHTML=`
    <span>Team ${i}</span>

    <span>
      1 <input type="radio" name="team" value="${i}-A">
    </span>

    <span>
      2 <input type="radio" name="team" value="${i}-B">
    </span>
  `;

  teamDiv.appendChild(div);
}

// FINAL JOIN
function finalJoin(){

  let selected = document.querySelector('input[name="team"]:checked');

  if(!selected){
    alert("Select team ❌");
    return;
  }

  let wallet = Number(localStorage.getItem("wallet")) || 0;

  if(wallet < 1){
    alert("❌ Not enough balance");
    return;
  }

  // player list per match
  let players = JSON.parse(localStorage.getItem("players_"+matchIndex)) || [];

  if(players.length >= 48){
    alert("❌ Match Full");
    return;
  }

  // deduct money
  wallet -= 1;
  localStorage.setItem("wallet",wallet);

  // save player
  players.push({
    uid: localStorage.getItem("uid"),
    team: selected.value
  });

  localStorage.setItem("players_"+matchIndex, JSON.stringify(players));

  // save match history
  let matches = JSON.parse(localStorage.getItem("joinedMatches")) || [];

  let room = Math.floor(Math.random()*900000)+100000;
  let pass = Math.floor(Math.random()*9000)+1000;

  matches.push({
    type: matchType,
    time: new Date().toLocaleTimeString(),
    room: room,
    pass: pass,
    started: false,
    completed: false
  });

  localStorage.setItem("joinedMatches",JSON.stringify(matches));

  // save room
  localStorage.setItem("room",room);
  localStorage.setItem("pass",pass);

  // go to room
  window.location.href="room.html";
}

</script>

</body>
</html>
