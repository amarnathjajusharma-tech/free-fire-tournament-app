<!DOCTYPE html>
<html>
<head>
<title>Details</title>
<style>
body {
  background: black;
  color: white;
  text-align: center;
}
input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 80%;
}
button {
  padding: 10px;
  background: purple;
  color: white;
}
</style>
</head>

<body>

<h2>Enter Details</h2>

<input id="name" placeholder="Player Name">
<input id="uid" placeholder="Player UID">

<button onclick="save()">Continue</button>

<script>
function save(){
  let name = document.getElementById("name").value;
  let uid = document.getElementById("uid").value;

  if(!name || !uid){
    alert("Fill all details ❌");
    return;
  }

  localStorage.setItem("name", name);
  localStorage.setItem("uid", uid);

  window.location.href = "app.html";
}
</script>

</body>
</html>
