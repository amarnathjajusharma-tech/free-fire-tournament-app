<!DOCTYPE html>
<html>
<head>
<title>ADMIN PANEL</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#222;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

input{
  padding:10px;
  margin:10px;
  width:80%;
}

button{
  padding:10px;
  margin:10px;
  background:#4caf50;
  color:white;
  border:none;
  border-radius:5px;
}
</style>

</head>

<body>

<h2>👑 ADMIN PANEL</h2>

<!-- ROOM -->
<div class="card">
  <h3>🎮 Set Room</h3>

  <input id="room" placeholder="Room ID">
  <input id="pass" placeholder="Password">

  <button onclick="setRoom()">SET ROOM</button>
</div>

<!-- DEPOSIT -->
<div class="card">
  <h3>💰 Approve Deposit</h3>

  <button onclick="approveDeposit()">Approve Deposit</button>
</div>

<!-- ADD MONEY -->
<div class="card">
  <h3>➕ Add Money</h3>

  <input id="addAmt" placeholder="Amount">

  <button onclick="addMoney()">Add</button>
</div>

<!-- KILL SYSTEM -->
<div class="card">
  <h3>🎯 Kill Result</h3>

  <input id="kills" placeholder="Kills">
  <input id="booyah" placeholder="Booyah? (yes/no)">

  <button onclick="addKill()">Add Winning</button>
</div>

<!-- COMPLETE -->
<div class="card">
  <h3>🏁 Complete Match</h3>

  <button onclick="completeMatch()">Complete</button>
</div>

<script>

// SET ROOM
function setRoom(){

  let room = document.getElementById("room").value;
  let pass = document.getElementById("pass").value;

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];

  if(data.length==0){
    alert("No match ❌");
    return;
  }

  data[data.length-1].room = room;
  data[data.length-1].pass = pass;
  data[data.length-1].started = true;

  localStorage.setItem("joinedMatches",JSON.stringify(data));

  alert("✅ Room Set");
}

// APPROVE DEPOSIT
function approveDeposit(){

  let amt = Number(localStorage.getItem("pendingDeposit"));

  if(!amt){
    alert("No pending ❌");
    return;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += amt;

  localStorage.setItem("wallet",bal);
  localStorage.removeItem("pendingDeposit");

  alert("✅ Deposit Approved");
}

// ADD MONEY
function addMoney(){

  let amt = Number(document.getElementById("addAmt").value);

  if(!amt){
    alert("Enter amount ❌");
    return;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += amt;

  localStorage.setItem("wallet",bal);

  alert("✅ Money Added");
}

// KILL SYSTEM
function addKill(){

  let kills = Number(document.getElementById("kills").value);
  let booyah = document.getElementById("booyah").value;

  if(kills==="" || kills<0){
    alert("Enter valid kills ❌");
    return;
  }

  let win = kills * 0.5;

  let type = localStorage.getItem("matchType");

  if(booyah.toLowerCase()=="yes"){
    if(type=="Solo") win += 10;
    if(type=="Duo") win += 20;
    if(type=="Squad") win += 40;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += win;

  localStorage.setItem("wallet",bal);

  alert("💰 Winning Added: ₹"+win);
}

// COMPLETE MATCH
function completeMatch(){

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];

  if(data.length==0){
    alert("No match ❌");
    return;
  }

  data[data.length-1].completed = true;

  localStorage.setItem("joinedMatches",JSON.stringify(data));

  alert("🏁 Match Completed");
}

</script>

</body>
</html>
