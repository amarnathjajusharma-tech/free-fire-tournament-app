<!DOCTYPE html>
<html>
<head>
<title>PRGAMER ADMIN PANEL</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card{
  background:#222;
  margin:20px;
  padding:20px;
  border-radius:10px;
}

input{
  padding:10px;
  margin:10px;
  width:80%;
}

button{
  padding:10px;
  margin:10px;
  background:#4caf50;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>👑 PRGAMER ADMIN PANEL</h1>

<!-- ROOM -->
<div class="card">
  <h3>🎮 Set Room ID</h3>
  <input id="room" placeholder="Room ID">
  <input id="pass" placeholder="Password">
  <button onclick="setRoom()">SET ROOM</button>
</div>

<!-- DEPOSIT -->
<div class="card">
  <h3>💰 Deposit Approve</h3>
  <button onclick="approveDeposit()">Approve Deposit</button>
</div>

<!-- WITHDRAW -->
<div class="card">
  <h3>💸 Withdraw Approve</h3>
  <button onclick="approveWithdraw()">Approve Withdraw</button>
</div>

<!-- ADD MONEY -->
<div class="card">
  <h3>➕ Add Money</h3>
  <input id="addAmt" placeholder="Enter Amount">
  <button onclick="addMoney()">Add Money</button>
</div>

<!-- KILL SYSTEM -->
<div class="card">
  <h3>🎯 Add Kill Winning</h3>
  <input id="kills" placeholder="Kills">
  <input id="booyah" placeholder="Booyah? (yes/no)">
  <button onclick="addKill()">Add Winning</button>
</div>

<!-- COMPLETE MATCH -->
<div class="card">
  <h3>🏁 Complete Match</h3>
  <button onclick="completeMatch()">Complete Match</button>
</div>

<script>

// ROOM SET
function setRoom(){

  let room = document.getElementById("room").value;
  let pass = document.getElementById("pass").value;

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];

  if(data.length==0){
    alert("No match ❌");
    return;
  }

  data[data.length-1].room = room;
  data[data.length-1].pass = pass;
  data[data.length-1].started = true;

  localStorage.setItem("joinedMatches",JSON.stringify(data));

  alert("✅ Room ID & Password Set");
}

// DEPOSIT APPROVE
function approveDeposit(){

  let amt = Number(localStorage.getItem("pendingDeposit"));

  if(!amt){
    alert("No pending deposit ❌");
    return;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += amt;

  localStorage.setItem("wallet",bal);
  localStorage.removeItem("pendingDeposit");

  // update transaction status
  let list = JSON.parse(localStorage.getItem("transactions")) || [];
  if(list.length > 0){
    list[list.length-1].status = "success";
    localStorage.setItem("transactions", JSON.stringify(list));
  }

  alert("✅ Deposit Approved & Wallet Updated");
}

// WITHDRAW APPROVE
function approveWithdraw(){

  let list = JSON.parse(localStorage.getItem("withdraw")) || [];

  if(list.length==0){
    alert("No withdraw requests ❌");
    return;
  }

  let last = list[list.length-1];

  let bal = Number(localStorage.getItem("wallet")) || 0;

  if(last.status === "done"){
    alert("Already approved ❌");
    return;
  }

  if(last.amount > bal){
    alert("Low balance ❌");
    return;
  }

  bal -= last.amount;

  localStorage.setItem("wallet",bal);

  last.status = "done";

  localStorage.setItem("withdraw", JSON.stringify(list));

  alert("✅ Withdraw Approved");
}

// ADD MONEY
function addMoney(){

  let amt = Number(document.getElementById("addAmt").value);

  if(!amt){
    alert("Enter amount ❌");
    return;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += amt;

  localStorage.setItem("wallet",bal);

  alert("💰 Money Added");
}

// KILL SYSTEM
function addKill(){

  let kills = Number(document.getElementById("kills").value);
  let booyah = document.getElementById("booyah").value;

  if(kills==="" || kills<0){
    alert("Enter valid kills ❌");
    return;
  }

  let win = kills * 0.5;

  let type = localStorage.getItem("matchType");

  if(booyah.toLowerCase()=="yes"){
    if(type=="Solo") win += 10;
    if(type=="Duo") win += 20;
    if(type=="Squad") win += 40;
  }

  let bal = Number(localStorage.getItem("wallet")) || 0;

  bal += win;

  localStorage.setItem("wallet",bal);

  alert("💰 Winning Added: ₹"+win);
}

// COMPLETE MATCH
function completeMatch(){

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];

  if(data.length==0){
    alert("No match ❌");
    return;
  }

  data[data.length-1].completed = true;

  localStorage.setItem("joinedMatches",JSON.stringify(data));

  alert("🏁 Match Completed");
}

</script>

</body>
</html>
