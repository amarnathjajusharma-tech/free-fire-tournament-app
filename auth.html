<!DOCTYPE html>
<html>
<head>
<title>Login / Register</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
.container{margin-top:80px;}
input{
  padding:12px;
  margin:10px;
  width:80%;
  border-radius:8px;
}
button{
  padding:12px;
  margin:10px;
  width:80%;
  border:none;
  border-radius:8px;
}
.login{background:#4caf50;color:white;}
.register{background:#ff5722;color:white;}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Login / Register</h2>

<input id="name" placeholder="Full Name (register)">
<input id="phone" placeholder="Mobile Number">
<input id="pass" placeholder="Password">

<button class="register" onclick="register()">Register</button>
<button class="login" onclick="login()">Login</button>

</div>

<script>

// REGISTER
function register(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(!name || !phone || !pass){
alert("Fill all fields ❌");
return;
}

let user={name,phone,pass};

localStorage.setItem("user",JSON.stringify(user));

alert("Registered ✅");
}

// LOGIN
function login(){

let u=JSON.parse(localStorage.getItem("user"));

let phone=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(!u){
alert("Register first ❌");
return;
}

if(u.phone==phone && u.pass==pass){

// 🔥 IMPORTANT FIX
localStorage.setItem("loggedIn","true");

alert("Login Success ✅");

// redirect
window.location="home.html";

}else{
alert("Wrong details ❌");
}

}

</script>

</body>
</html>
