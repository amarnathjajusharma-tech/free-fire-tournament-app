<!DOCTYPE html>
<html>
<head>
<title>Login / Register</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.container{
  margin-top:80px;
}

input{
  padding:12px;
  margin:10px;
  width:80%;
  border-radius:8px;
  border:none;
}

button{
  padding:12px;
  margin:10px;
  width:80%;
  font-size:16px;
  border:none;
  border-radius:8px;
}

.login{background:#4caf50;color:white;}
.register{background:#ff5722;color:white;}
</style>

</head>

<body>

<div class="container">

<h2 id="title">🔐 Login / Register</h2>

<input id="name" placeholder="Full Name (for register)">
<input id="phone" placeholder="Mobile Number">
<input id="pass" placeholder="Password">

<button class="register" onclick="register()">Register</button>
<button class="login" onclick="login()">Login</button>

</div>

<script>

// REGISTER
function register(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(!name || !phone || !pass){
alert("Fill all fields ❌");
return;
}

let user={
name:name,
phone:phone,
pass:pass
};

localStorage.setItem("user",JSON.stringify(user));

alert("Registered Successfully ✅");
}

// LOGIN
function login(){

let u=JSON.parse(localStorage.getItem("user"));

let phone=document.getElementById("phone").value;
let pass=document.getElementById("pass").value;

if(!u){
alert("Register first ❌");
return;
}

if(u.phone==phone && u.pass==pass){

localStorage.setItem("loggedIn","true");

alert("Login Success ✅");

// dashboard
window.location="home.html";

}else{
alert("Wrong details ❌");
}

}

</script>

</body>
</html>
