<!DOCTYPE html>
<html>
<head>
<title>PRGAMER</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
.container{margin-top:100px;}
button{
  padding:15px;
  margin:10px;
  width:80%;
  font-size:18px;
  background:#ff5722;
  border:none;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">🔥 Welcome to PRGAMER</h1>
<h3 id="langtxt">Select Language</h3>

<button onclick="setLang('english')">English</button>
<button onclick="setLang('hindi')">Hindi</button>
<button onclick="setLang('odia')">Odia</button>

</div>

<script>
function setLang(lang){

localStorage.setItem("lang",lang);

// redirect
window.location="auth.html";

}
</script>

</body>
</html>
