<!DOCTYPE html>
<html>
<head>
<title>PRGAMER</title>

<style>
body{margin:0;background:black;color:white;font-family:Arial}
.header{padding:15px;text-align:center;background:#111;font-size:22px}
.card{
  margin:10px;
  padding:15px;
  background:#2a004f;
  border-radius:10px;
  text-align:center;
}
</style>

</head>

<body>

<div class="header">🔥 PRGAMER DASHBOARD</div>

<div class="card" onclick="openTab('upcoming')">📅 Upcoming Matches</div>
<div class="card" onclick="openTab('ongoing')">🔥 Ongoing Matches</div>
<div class="card" onclick="openTab('completed')">✅ Completed Matches</div>

<div id="content"></div>

<script>

function openTab(type){

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];
  let div = document.getElementById("content");
  div.innerHTML = "";

  if(type=="upcoming"){
    data.forEach(m=>{
      if(!m.started){
        div.innerHTML += `
        <div class="card">
        ⏳ ${m.type} <br>${m.time}
        </div>`;
      }
    });
  }

  if(type=="ongoing"){
    data.forEach(m=>{
      if(m.started && !m.completed){
        div.innerHTML += `
        <div class="card">
        🎮 ${m.type}<br>
        Room: ${m.room}<br>
        Pass: ${m.pass}
        </div>`;
      }
    });
  }

  if(type=="completed"){
    data.forEach(m=>{
      if(m.completed){
        div.innerHTML += `
        <div class="card">
        ✅ ${m.type} Match Completed
        </div>`;
      }
    });
  }

}

</script>

</body>
</html>
