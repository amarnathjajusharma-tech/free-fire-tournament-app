<!DOCTYPE html>
<html>
<head>
<title>PRGAMER</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

/* TOP WALLET */
#topbar{
  position:fixed;
  top:0;
  right:0;
  background:#ff5722;
  padding:10px 20px;
  border-bottom-left-radius:10px;
  font-size:16px;
  cursor:pointer;
  z-index:999;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
  font-size:22px;
  background:#111;
}

/* CARD */
.card{
  margin:15px;
  padding:15px;
  background:#2a004f;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* CONTENT */
#content{
  margin-top:10px;
}
</style>

</head>

<body>

<!-- WALLET -->
<div id="topbar" onclick="window.location='wallet.html'">
💰 ₹<span id="bal">0</span>
</div>

<!-- HEADER -->
<div class="header">🔥 PRGAMER DASHBOARD</div>

<!-- NAV -->
<div class="card" onclick="openTab('upcoming')">📅 Upcoming Matches</div>
<div class="card" onclick="openTab('ongoing')">🔥 Ongoing Matches</div>
<div class="card" onclick="openTab('completed')">✅ Completed Matches</div>

<div class="card" onclick="goMatch()">🎮 FULL MAP</div>
<div class="card" onclick="goWallet()">💰 WALLET</div>

<!-- CONTENT -->
<div id="content"></div>

<script>

// NAVIGATION
function goMatch(){
  window.location.href="match.html";
}

function goWallet(){
  window.location.href="wallet.html";
}

// LIVE BALANCE
function updateBalance(){
  let bal = localStorage.getItem("wallet") || 0;
  document.getElementById("bal").innerText = bal;
}
setInterval(updateBalance,1000);
updateBalance();

// TAB SYSTEM
function openTab(type){

  let data = JSON.parse(localStorage.getItem("joinedMatches")) || [];
  let div = document.getElementById("content");

  div.innerHTML = "";

  // UPCOMING
  if(type=="upcoming"){
    data.forEach(m=>{
      if(!m.started){
        div.innerHTML += `
        <div class="card">
          ⏳ ${m.type} Match<br>
          Time: ${m.time}<br>
          Status: Waiting for Room
        </div>`;
      }
    });
  }

  // ONGOING
  if(type=="ongoing"){
    data.forEach(m=>{
      if(m.started && m.room!="WAIT"){
        div.innerHTML += `
        <div class="card">
          🎮 ${m.type} Match<br>
          Room ID: ${m.room}<br>
          Password: ${m.pass}
        </div>`;
      }
    });
  }

  // COMPLETED
  if(type=="completed"){
    data.forEach(m=>{
      if(m.completed){
        div.innerHTML += `
        <div class="card">
          ✅ ${m.type} Match Completed
        </div>`;
      }
    });
  }

}

</script>

</body>
</html>
